<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Simple E-Commerce Store</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="main-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Store</a>
      <nav class="main-nav">
        <a href="products.html">Shop</a>
        <a href="profile.html">Profile</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section class="admin-grid">
      <div class="admin-panel-card">
        <h1>Admin Panel</h1>
        <p>Manage products, users, and orders from this dashboard.</p>
      </div>
      <div class="admin-card">
        <h2>Product Management</h2>
        <form id="product-form" class="auth-form admin-form">
          <input id="product-name" placeholder="Name" required />
          <input id="product-category" placeholder="Category" required />
          <input id="product-image" placeholder="Image URL" required />
          <input id="product-price" type="number" placeholder="Price" min="0" step="0.01" required />
          <input id="product-stock" type="number" placeholder="Stock Count" min="0" required />
          <textarea id="product-description" placeholder="Description" rows="4" required></textarea>
          <button type="submit" class="btn btn-primary">Create Product</button>
        </form>
        <div id="admin-product-list"></div>
      </div>
      <div class="admin-card">
        <h2>Order Management</h2>
        <div id="admin-order-list"></div>
      </div>
      <div class="admin-card">
        <h2>User Management</h2>
        <div id="admin-user-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Simple E-Commerce Store © Darshu ,2026-27</p>
    </div>
  </footer>
  <script src="js/admin.js"></script>
</body>
</html>
