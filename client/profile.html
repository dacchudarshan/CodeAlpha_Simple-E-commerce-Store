<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Simple E-Commerce Store</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="main-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Store</a>
      <nav class="main-nav">
        <a href="products.html">Shop</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section class="profile-grid">
      <div class="profile-card">
        <h1>Profile</h1>
        <form id="profile-form" class="profile-form">
          <label for="name">Full Name</label>
          <input type="text" id="name" required />
          <label for="email">Email</label>
          <input type="email" id="email" required />
          <label for="address">Shipping Address</label>
          <input type="text" id="address" />
          <label for="phone">Phone</label>
          <input type="tel" id="phone" />
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="Leave blank to keep current" />
          <button type="submit" class="btn btn-primary">Update Profile</button>
          <button id="logout-btn" type="button" class="btn btn-secondary">Logout</button>
          <div id="profile-message" class="form-message"></div>
        </form>
      </div>
      <div class="orders-card">
        <h2>Order History</h2>
        <div id="order-history" class="order-history"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Simple E-Commerce Store © Darshu ,2026-27</p>
    </div>
  </footer>
  <script src="js/profile.js"></script>
</body>
</html>
