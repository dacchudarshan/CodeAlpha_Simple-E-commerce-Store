<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Simple E-Commerce Store</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="main-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Store</a>
      <nav class="main-nav">
        <a href="register.html">Register</a>
        <a href="products.html">Shop</a>
      </nav>
    </div>
  </header>

  <main class="container auth-card">
    <h1>Login</h1>
    <form id="login-form" class="auth-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required />
      <button type="submit" class="btn btn-primary">Sign In</button>
      <p class="form-note">New user? <a href="register.html">Create an account</a></p>
      <div id="login-message" class="form-message"></div>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Simple E-Commerce Store © Darshu ,2026-27</p>
    </div>
  </footer>
  <script src="js/login.js"></script>
</body>
</html>
