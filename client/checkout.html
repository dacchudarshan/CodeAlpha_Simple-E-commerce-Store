<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - Simple E-Commerce Store</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="main-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Store</a>
      <nav class="main-nav">
        <a href="products.html">Shop</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section class="checkout-card">
      <h1>Checkout</h1>
      <div id="checkout-items" class="checkout-items"></div>
      <form id="checkout-form" class="checkout-form">
        <label for="shippingAddress">Shipping Address</label>
        <input type="text" id="shippingAddress" required />
        <label for="paymentMethod">Payment Method</label>
        <select id="paymentMethod">
          <option value="Cash on Delivery">Cash on Delivery</option>
          <option value="Credit Card">Credit Card</option>
        </select>
        <div class="summary-block">
          <p>Items: <span id="checkout-items-price">₹0.00</span></p>
          <p>Shipping: <span id="checkout-shipping-price">₹0.00</span></p>
          <p>Tax: <span id="checkout-tax-price">₹0.00</span></p>
          <p class="summary-total">Total: <span id="checkout-total-price">₹0.00</span></p>
        </div>
        <button type="submit" class="btn btn-primary">Place Order</button>
        <div id="checkout-message" class="form-message"></div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Simple E-Commerce Store © Darshu ,2026-27</p>
    </div>
  </footer>
  <script src="js/checkout.js"></script>
</body>
</html>
